version: '3.8'

services:
  db:
    image: postgres:16
    container_name: patient-service-db
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - "5000:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data: